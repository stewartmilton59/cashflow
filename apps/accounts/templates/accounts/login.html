{% extends 'base.html' %}

{% block title %}Login - CashFlow{% endblock %}

{% block content %}
<div class="login-box">
    <h2>🔐 CashFlow Login</h2>
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.85rem;">
        Directors see all branches | Accountants see their branch only
    </p>
</div>
{% endblock %}
